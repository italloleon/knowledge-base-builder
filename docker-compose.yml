services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - kbb-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass "${REDIS_PASSWORD}" --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    networks:
      - kbb-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  model-init:
    build: .
    command: >
      sh -c "
        if [ ! -f /opt/docling_models/.initialized ]; then
          echo 'Downloading Docling models...' &&
          docling-tools models download --output-dir /opt/docling_models &&
          touch /opt/docling_models/.initialized &&
          echo 'Models ready.'
        else
          echo 'Docling models already present, skipping download.'
        fi
      "
    volumes:
      - docling_models:/opt/docling_models
    networks:
      - kbb-net
    restart: on-failure

  migrate:
    build: .
    command: ["sh", "scripts/migrate.sh"]
    env_file: .env
    networks:
      - kbb-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build: .
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - kbb-net
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      model-init:
        condition: service_completed_successfully
    volumes:
      - uploads:/app/uploads
      - docling_models:/opt/docling_models
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "-m", "arq", "worker.tasks.WorkerSettings"]
    env_file: .env
    networks:
      - kbb-net
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      model-init:
        condition: service_completed_successfully
    volumes:
      - uploads:/app/uploads
      - docling_models:/opt/docling_models
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
  docling_models:

networks:
  kbb-net:
    name: kbb-net
    driver: bridge
